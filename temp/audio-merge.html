<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>무료 오디오 합치기 - 여러 MP3 음성 파일 하나로 합치기 | modutools</title>
<meta name="description" content="별도의 설치 없이 브라우저에서 여러 개의 오디오 파일을 순서대로 하나로 합치고 다운로드하세요. 모든 처리는 내 기기에서 안전하게 이루어집니다.">
<link rel="canonical" href="https://modutools.com/convert/audio-merge.html">
<link rel="stylesheet" href="/css/common.css">
<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}

/* 업로드 영역: Moodutools 특유의 깔끔한 점선 박스 */
.upload-box {
    border: 2px dashed var(--g200); border-radius: var(--radius);
    padding: 40px 20px; text-align: center; cursor: pointer;
    background: var(--g50); transition: all 0.2s;
}
.upload-box:hover { border-color: var(--primary); background: #fff; box-shadow: var(--shadow); }
.upload-box .icon { font-size: 32px; margin-bottom: 12px; display: block; }
.upload-box .main-txt { font-weight: 700; color: var(--g800); font-size: 16px; }
.upload-box .sub-txt { font-size: 13px; color: var(--g500); margin-top: 6px; }

/* 오디오 리스트: salary.html의 리스트 내역 스타일 계승 */
.audio-list { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
.audio-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; background: #fff; border: 1px solid var(--g200); border-radius: var(--radius);
    transition: transform 0.2s;
}
.audio-item:hover { border-color: var(--primary); }
.audio-item .index { font-family: 'Inter', sans-serif; font-weight: 800; color: var(--primary); font-size: 14px; width: 20px; }
.audio-item .info { flex: 1; min-width: 0; }
.audio-item .name { font-size: 14px; font-weight: 600; color: var(--g800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.audio-item .meta { font-size: 12px; color: var(--g400); margin-top: 3px; display: flex; gap: 8px; }
.btn-remove { color: var(--g300); cursor: pointer; padding: 4px; font-size: 18px; line-height: 1; }
.btn-remove:hover { color: var(--red); }

/* 실행 영역 */
.action-area { display: none; margin-top: 8px; }
.progress-container { height: 6px; background: var(--g100); border-radius: 3px; overflow: hidden; margin-bottom: 16px; display: none; }
.progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.2s; }
.btn-merge { width: 100%; background: var(--primary); color: #fff; font-weight: 700; height: 54px; font-size: 16px; border-radius: var(--radius); }
</style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">modutools</a>
    </div>
</header>

<main class="page">
    <h1 class="page-title">오디오 합치기</h1>
    <p class="page-sub">여러 개의 음성 또는 음악 파일을 순서대로 연결하여 하나의 파일로 만듭니다.</p>

    <div class="card">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span class="icon">🎵</span>
            <div class="main-txt">합칠 파일들을 선택하세요</div>
            <p class="sub-txt">MP3, WAV, M4A 등 다중 선택 가능</p>
            <input type="file" id="fileInput" multiple accept="audio/*" style="display:none" onchange="handleAudioFiles(this.files)">
        </div>

        <div id="audioList" class="audio-list"></div>
    </div>

    <div id="actionContainer" class="action-area">
        <div class="progress-container" id="progContainer"><div class="progress-bar" id="progBar"></div></div>
        <button onclick="startMerging()" class="mt-btn btn-merge">하나의 파일로 합치고 저장하기</button>
        <p style="text-align:center; font-size:12px; color:var(--g400); margin-top:12px;">모든 처리는 브라우저 내부에서 수행되며 파일은 서버로 전송되지 않습니다.</p>
    </div>

    <div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
</main>

<script>
let queue = [];
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function handleAudioFiles(files) {
    const statusArea = document.getElementById('actionContainer');
    for (let file of files) {
        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        queue.push({ name: file.name, buffer: audioBuffer, size: (file.size/1024/1024).toFixed(2) });
    }
    renderQueue();
    if (queue.length > 0) statusArea.style.display = 'block';
}

function renderQueue() {
    const list = document.getElementById('audioList');
    list.innerHTML = queue.map((f, i) => `
        <div class="audio-item">
            <span class="index">${i + 1}</span>
            <div class="info">
                <div class="name">${f.name}</div>
                <div class="meta">
                    <span>${f.size}MB</span>
                    <span>•</span>
                    <span>${Math.floor(f.buffer.duration)}초</span>
                </div>
            </div>
            <div class="btn-remove" onclick="removeFile(${i})">×</div>
        </div>
    `).join('');
}

function removeFile(idx) {
    queue.splice(idx, 1);
    renderQueue();
    if (queue.length === 0) document.getElementById('actionContainer').style.display = 'none';
}

async function startMerging() {
    if (queue.length === 0) return;
    
    const bar = document.getElementById('progBar');
    const container = document.getElementById('progContainer');
    container.style.display = 'block';
    
    // 1. 전체 길이 및 채널 설정
    const totalLength = queue.reduce((acc, cur) => acc + cur.buffer.length, 0);
    const numberOfChannels = queue[0].buffer.numberOfChannels;
    const sampleRate = queue[0].buffer.sampleRate;
    
    const mergedBuffer = audioCtx.createBuffer(numberOfChannels, totalLength, sampleRate);

    // 2. 병합 처리 (채널 데이터 복사)
    let offset = 0;
    for (let i = 0; i < queue.length; i++) {
        for (let channel = 0; channel < numberOfChannels; channel++) {
            mergedBuffer.getChannelData(channel).set(queue[i].buffer.getChannelData(channel), offset);
        }
        offset += queue[i].buffer.length;
        bar.style.width = ((i + 1) / queue.length * 100) + '%';
    }

    // 3. WAV 인코딩 및 즉시 다운로드
    exportWav(mergedBuffer);
}

function exportWav(buffer) {
    const numOfChan = buffer.numberOfChannels,
        length = buffer.length * numOfChan * 2 + 44,
        bufferArr = new ArrayBuffer(length),
        view = new DataView(bufferArr),
        channels = [], i, sample, offset = 0, pos = 0;

    function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
    function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

    // 헤더 작성
    writeString(view, pos, 'RIFF'); pos += 4;
    setUint32(length - 8);
    writeString(view, pos, 'WAVE'); pos += 4;
    writeString(view, pos, 'fmt '); pos += 4;
    setUint32(16);
    setUint16(1);
    setUint16(numOfChan);
    setUint32(buffer.sampleRate);
    setUint32(buffer.sampleRate * 2 * numOfChan);
    setUint16(numOfChan * 2);
    setUint16(16);
    writeString(view, pos, 'data'); pos += 4;
    setUint32(length - 44);

    // 데이터 복사
    for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
    offset = 44;
    for (i = 0; i < buffer.length; i++) {
        for (let ch = 0; ch < numOfChan; ch++) {
            sample = Math.max(-1, Math.min(1, channels[ch][i]));
            sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
            view.setInt16(pos, sample, true);
            pos += 2;
        }
    }

    const blob = new Blob([view], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `modutools_merged_${Date.now()}.wav`;
    a.click();
    
    document.getElementById('progContainer').style.display = 'none';
}

function writeString(view, offset, string) {
    for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
    }
}
</script>
</body>
</html>
