<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>meSpeak.js TTS 테스트</title>
<style>
body{font-family:'Pretendard',sans-serif;max-width:600px;margin:40px auto;padding:20px}
h1{font-size:20px}
textarea{width:100%;height:120px;padding:12px;font-size:15px;border:1.5px solid #ddd;border-radius:8px;font-family:inherit;resize:vertical}
.btn-area{display:flex;gap:8px;margin-top:12px}
button{flex:1;height:48px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-play{background:#2563EB;color:#fff}
.btn-save{background:#059669;color:#fff}
.btn-stop{background:#EF4444;color:#fff}
select{width:100%;padding:10px;margin:8px 0;border:1.5px solid #ddd;border-radius:8px;font-size:14px}
.status{margin-top:12px;padding:12px;border-radius:8px;font-size:13px;text-align:center;display:none}
.status.ok{background:#D1FAE5;color:#059669;display:block}
.status.warn{background:#FEF3C7;color:#D97706;display:block}
.status.info{background:#DBEAFE;color:#2563EB;display:block}
label{font-size:13px;font-weight:600;color:#555;display:block;margin-top:12px;margin-bottom:4px}
.range-row{display:flex;gap:16px;margin:8px 0}
.range-item{flex:1}
.range-item span{font-size:12px;color:#888}
.range-item b{float:right;font-size:13px}
</style>
</head>
<body>
<h1>🔊 meSpeak.js TTS 테스트</h1>
<p style="font-size:13px;color:#888">eSpeak 엔진 기반 100% 클라이언트 TTS. WAV 파일 저장 가능 여부 테스트.</p>

<textarea id="text">안녕하세요. 모두의 도구 텍스트 음성 변환 테스트입니다. 이 음성은 브라우저에서 직접 생성되며, WAV 파일로 저장할 수 있습니다.</textarea>

<label>음성 선택</label>
<select id="voiceSelect">
  <option value="ko">한국어</option>
  <option value="en/en-us">영어 (US)</option>
  <option value="en/en">영어 (UK)</option>
  <option value="ja">일본어</option>
  <option value="zh">중국어</option>
</select>

<div class="range-row">
  <div class="range-item">
    <span>속도</span><b id="speedVal">175</b>
    <input type="range" id="speed" min="80" max="400" value="175" style="width:100%" oninput="document.getElementById('speedVal').textContent=this.value">
  </div>
  <div class="range-item">
    <span>톤</span><b id="pitchVal">50</b>
    <input type="range" id="pitch" min="0" max="99" value="50" style="width:100%" oninput="document.getElementById('pitchVal').textContent=this.value">
  </div>
</div>

<div class="btn-area">
  <button class="btn-play" onclick="playTTS()">▶ 재생</button>
  <button class="btn-stop" onclick="stopTTS()">■ 정지</button>
  <button class="btn-save" onclick="saveTTS()">⬇ WAV 저장</button>
</div>

<div id="status" class="status"></div>

<!-- meSpeak.js CDN -->
<script src="https://www.masswerk.at/mespeak/mespeak.js"></script>

<script>
var loaded=false;
var voicesLoaded={};

function showStatus(msg,type){
  var el=document.getElementById('status');
  el.className='status '+(type||'info');
  el.textContent=msg;
  el.style.display='block';
}

// 초기화
meSpeak.loadConfig("https://www.masswerk.at/mespeak/mespeak_config.json");

function ensureVoice(voiceId, callback){
  if(voicesLoaded[voiceId]){
    callback();
    return;
  }
  showStatus('음성 데이터 로딩 중...','info');
  meSpeak.loadVoice("https://www.masswerk.at/mespeak/voices/"+voiceId+".json", function(){
    voicesLoaded[voiceId]=true;
    loaded=true;
    callback();
  });
}

function getOpts(){
  return {
    voice: document.getElementById('voiceSelect').value,
    speed: parseInt(document.getElementById('speed').value),
    pitch: parseInt(document.getElementById('pitch').value),
    variant: 'm3'
  };
}

function playTTS(){
  var text=document.getElementById('text').value.trim();
  if(!text){showStatus('텍스트를 입력하세요.','warn');return;}
  var opts=getOpts();
  ensureVoice(opts.voice, function(){
    showStatus('재생 중...','info');
    meSpeak.speak(text, opts, function(success){
      if(success) showStatus('재생 완료','ok');
    });
  });
}

function stopTTS(){
  meSpeak.stop();
  showStatus('정지됨','ok');
}

function saveTTS(){
  var text=document.getElementById('text').value.trim();
  if(!text){showStatus('텍스트를 입력하세요.','warn');return;}
  var opts=getOpts();
  opts.rawdata='buffer';
  
  ensureVoice(opts.voice, function(){
    showStatus('WAV 파일 생성 중...','info');
    var wavData=meSpeak.speak(text, opts);
    if(!wavData){
      showStatus('음성 생성에 실패했습니다.','warn');
      return;
    }
    var blob=new Blob([new Uint8Array(wavData)],{type:'audio/wav'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='modutools-tts-'+Date.now()+'.wav';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},3000);
    showStatus('WAV 파일이 저장되었습니다!','ok');
  });
}
</script>
</body>
</html>
