<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 문체 정밀 판독기 Ultra | Moodutools</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 30px; margin-bottom: 20px; }
        .textarea { width: 100%; min-height: 300px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 16px; resize: vertical; box-sizing: border-box; }
        .btn-ultra { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-ultra:hover { background: #1d4ed8; transform: translateY(-2px); }
        
        /* 로딩 애니메이션 */
        #loadingArea { display: none; text-align: center; padding: 50px 0; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 결과 리포트 */
        #resultView { display: none; }
        .gauge-container { background: #e2e8f0; border-radius: 20px; height: 25px; margin: 20px 0; overflow: hidden; }
        #gaugeBar { height: 100%; width: 0%; transition: 1s ease-in-out; }
        .ad-space { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 20px; text-align: center; margin: 20px 0; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">Juti-Engine <span style="color:var(--primary)">Ultra v3.0</span></h1>
    <p style="text-align:center; color:#64748b;">국내 최대 규모 500+ 패턴 데이터베이스 기반 AI 정밀 판독</p>

    <div class="card" id="inputSection">
        <textarea id="inputText" class="textarea" placeholder="분석할 글을 300자 이상 입력하세요..."></textarea>
        <button onclick="runUltraScan()" class="btn-ultra">초정밀 분석 엔진 가동</button>
    </div>

    <div class="card" id="loadingArea">
        <div class="spinner"></div>
        <h2 id="statusText">엔진 초기화 중...</h2>
        <p id="subStatus">데이터베이스 로드 중 (1/3)</p>
        
        <div class="ad-space">
            <p style="font-size:12px; color:#94a3b8; margin-bottom:10px;">ADVERTISEMENT</p>
            <div style="height:250px; display:flex; align-items:center; justify-content:center; background:#eee;">
                광고 영역 (분석 대기 중 노출)
            </div>
        </div>
    </div>

    <div id="resultView" class="card">
        <h2>판독 결과 보고서</h2>
        <div class="gauge-container">
            <div id="gaugeBar"></div>
        </div>
        <h3 id="resultTitle" style="text-align:center; font-size:24px;"></h3>
        <div id="resultDesc" style="padding:15px; background:#f8fafc; border-radius:8px;"></div>
        <button onclick="location.reload()" class="btn-ultra" style="background:#64748b; margin-top:20px;">다시 분석하기</button>
    </div>
</div>

<script>
// 초정밀 패턴 데이터베이스 (500개급 확장을 위한 구조)
const JUTI_DB = {
    endings: ["할 수 있습니다", "하는 것이 중요합니다", "를 권장합니다", "알려져 있습니다", "기대됩니다", "분석됩니다", "보여집니다", "확인되었습니다", "설명할 수 있습니다", "필요가 있습니다", "수순입니다", "전망됩니다", "파악되었습니다", "의미합니다", "제공합니다"],
    connectors: ["무엇보다도", "결론적으로", "요약하자면", "뿐만 아니라", "이와 같이", "마찬가지로", "결과적으로", "더불어", "동시에", "특히 주목해야 할", "그 이유는 다음과", "관련하여", "그럼에도 불구하고", "기초하여", "비롯하여"],
    phrases: ["다양한 기능을 제공", "환경을 조성", "효율성을 높이", "전문화된 서비스", "최적의 솔루션", "시스템을 구축", "과정에서 발생", "영향을 미칩니다", "중요한 역할을 수행", "지속 가능한", "혁신적인 방법", "광범위한", "포괄적인", "기대를 모으고", "확인할 수 있"],
    // ... 실제 운영 시 마스터 주티님의 Llama 3.1로 뽑은 리스트를 여기에 500개 이상 채우면 됩니다.
};

async function runUltraScan() {
    const text = document.getElementById('inputText').value;
    if (text.length < 150) { alert("더 정밀한 분석을 위해 150자 이상 입력해주세요."); return; }

    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('loadingArea').style.display = 'block';

    // 단계별 로딩 연출 (광고 시간 확보)
    const status = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');

    await sleep(1200);
    status.innerText = "문장 구조 분석 중...";
    subStatus.innerText = "엔트로피 및 문장 리듬 계산 (2/3)";

    await sleep(1500);
    status.innerText = "패턴 데이터베이스 대조 중...";
    subStatus.innerText = "Juti-DB 500+ 패턴 전수 검사 (3/3)";

    await sleep(1000);
    executeFinalLogic(text);
}

function executeFinalLogic(text) {
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('resultView').style.display = 'block';

    let score = 0;
    const sentences = text.split(/[.!?]\s/).filter(s => s.length > 5);
    
    // 1. 패턴 밀도 분석
    let hitCount = 0;
    [...JUTI_DB.endings, ...JUTI_DB.connectors, ...JUTI_DB.phrases].forEach(p => {
        const regex = new RegExp(p, 'g');
        const matches = text.match(regex);
        if (matches) hitCount += matches.length;
    });

    const density = (hitCount / sentences.length) * 10;

    // 2. 문장 길이 다양성 (Burstiness)
    const lengths = sentences.map(s => s.length);
    const avg = lengths.reduce((a, b) => a + b) / lengths.length;
    const deviation = Math.sqrt(lengths.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / lengths.length);

    // 3. 최종 확률 계산 (최대치 보정)
    let probability = (density * 2.5) + (40 - deviation);
    probability = Math.min(99, Math.max(1, probability));

    // UI 출력
    const gauge = document.getElementById('gaugeBar');
    const title = document.getElementById('resultTitle');
    const desc = document.getElementById('resultDesc');

    gauge.style.width = probability + "%";
    gauge.style.backgroundColor = probability > 60 ? "#ef4444" : "#10b981";
    
    title.innerText = `AI 작성 확률: ${probability.toFixed(1)}%`;
    title.style.color = probability > 60 ? "#ef4444" : "#10b981";

    if (probability > 60) {
        desc.innerHTML = `<strong>⚠️ 경고: AI 작성 의심</strong><br>문장 패턴이 지나치게 정형화되어 있으며, 어미 처리 방식이 언어 모델의 전형적인 습관과 일치합니다.`;
    } else {
        desc.innerHTML = `<strong>✅ 안전: 인간 작성 가능성 높음</strong><br>문장의 호흡이 다채롭고 기계적인 반복 패턴이 거의 발견되지 않습니다.`;
    }
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
</script>

</body>
</html>
