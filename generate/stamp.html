<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.input-group{margin-bottom:16px}
.input-label{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px;display:block}
.input-field{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:12px 14px;font-size:18px;font-family:inherit;outline:none;transition:.2s;text-align:center;letter-spacing:4px}
.input-field:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.shape-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.shape-item{border:2px solid var(--g200);border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:.2s;background:#fff}
.shape-item:hover{border-color:var(--primary)}
.shape-item.active{border-color:var(--primary);background:var(--primary-light)}
.shape-canvas{display:block;margin:0 auto 6px}
.shape-name{font-size:11px;color:var(--g500);font-weight:600}
.shape-chars{font-size:10px;color:var(--g400)}
.font-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.font-item{border:1.5px solid var(--g200);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:.2s;background:#fff}
.font-item:hover{border-color:var(--primary)}
.font-item.active{border-color:var(--primary);background:var(--primary-light)}
.font-sample{font-size:20px;color:#C41E1E;margin-bottom:2px}
.font-name{font-size:10px;color:var(--g400)}
.color-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.color-btn{width:40px;height:40px;border-radius:10px;cursor:pointer;border:3px solid var(--g200);transition:.2s}
.color-btn.active{border-color:var(--g900);box-shadow:0 0 0 2px var(--primary)}
.color-btn:hover{transform:scale(1.1)}
.toggle-row{display:flex;gap:8px;margin-bottom:12px}
.toggle-btn{flex:1;padding:10px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;transition:.2s;background:#fff;font-family:inherit;color:var(--g700)}
.toggle-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.preview-area{text-align:center;padding:24px;margin-bottom:16px;background:repeating-conic-gradient(var(--g100) 0% 25%,#fff 0% 50%) 50%/16px 16px;border:1px solid var(--g200);border-radius:12px}
.preview-area canvas{display:block;margin:0 auto}
.download-row{display:flex;gap:8px}
.download-btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.download-btn.primary{background:var(--primary);color:#fff}
.download-btn.primary:hover{background:var(--primary-dark)}
.download-btn.secondary{background:#fff;color:var(--g700);border:1.5px solid var(--g200)}
.download-btn.secondary:hover{border-color:var(--primary);color:var(--primary)}
.disclaimer{font-size:11px;color:var(--g400);text-align:center;margin-top:16px;line-height:1.6}
.range-row{display:flex;align-items:center;gap:10px}
.range-input{flex:1;height:6px;-webkit-appearance:none;appearance:none;border-radius:3px;background:var(--g200);outline:none}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--primary);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.range-val{min-width:40px;text-align:right;font-size:14px;font-weight:700;color:var(--primary)}
@media(max-width:480px){.shape-grid{grid-template-columns:repeat(2,1fr)}.font-grid{grid-template-columns:1fr 1fr}}
</style>

<body>

<div class="card">

<label class="input-label">도장 색상</label>

</div>

<label class="input-label">테두리 굵기</label>

<script>
(function(){
var SHAPES=[
  {id:"circle",name:"원형",chars:"1~4자",draw:drawCircle},
  {id:"ellipse",name:"타원형",chars:"1~3자",draw:drawEllipse},
  {id:"square",name:"정사각형",chars:"2~4자",draw:drawSquare},
  {id:"roundsq",name:"둥근사각형",chars:"2~4자",draw:drawRoundSquare},
  {id:"approval",name:"결재도장",chars:"이름+날짜",draw:drawApproval},
  {id:"rect",name:"직사각형",chars:"2~4자",draw:drawRect}
];
var FONTS=[
  {family:"'Noto Serif KR'",name:"명조체",weight:900},
  {family:"'Gowun Batang'",name:"고운바탕",weight:700},
  {family:"'Nanum Myeongjo'",name:"나눔명조",weight:800},
  {family:"'Nanum Brush Script'",name:"붓글씨",weight:400},
  {family:"'Nanum Pen Script'",name:"펜글씨",weight:400},
  {family:"'Black Han Sans'",name:"블랙한산스",weight:400},
  {family:"'Do Hyeon'",name:"도현체",weight:400},
  {family:"'Jua'",name:"주아체",weight:400},
  {family:"'Hi Melody'",name:"하이멜로디",weight:400},
  {family:"'Gaegu'",name:"개구체",weight:700}
];
var COLORS=["#C41E1E","#1E3A8A","#1E1E1E","#7C2D12","#064E3B","#581C87"];
var currentShape="circle";
var currentFont=0;
var currentColor="#C41E1E";
var currentBorder=4;

// Build shape grid
var shapeGrid=document.getElementById("shapeGrid");
SHAPES.forEach(function(s,i){
  var div=document.createElement("div");
  div.className="shape-item"+(i===0?" active":"");
  div.dataset.shape=s.id;
  div.innerHTML='<canvas class="shape-canvas" width="80" height="80"></canvas><div class="shape-name">'+s.name+'</div><div class="shape-chars">'+s.chars+'</div>';
  div.addEventListener("click",function(){
    document.querySelectorAll(".shape-item").forEach(function(el){el.classList.remove("active");});
    div.classList.add("active");
    currentShape=s.id;
    drawPreview();
  });
  shapeGrid.appendChild(div);
});

// Build font grid
var fontGrid=document.getElementById("fontGrid");
FONTS.forEach(function(f,i){
  var div=document.createElement("div");
  div.className="font-item"+(i===0?" active":"");
  div.innerHTML='<div class="font-sample" style="font-family:'+f.family+';font-weight:'+f.weight+'">도장</div><div class="font-name">'+f.name+'</div>';
  div.addEventListener("click",function(){
    document.querySelectorAll(".font-item").forEach(function(el){el.classList.remove("active");});
    div.classList.add("active");
    currentFont=i;
    drawPreview();
  });
  fontGrid.appendChild(div);
});

// Build color row
var colorRow=document.getElementById("colorRow");
COLORS.forEach(function(c,i){
  var div=document.createElement("div");
  div.className="color-btn"+(i===0?" active":"");
  div.style.background=c;
  div.addEventListener("click",function(){
    document.querySelectorAll(".color-btn").forEach(function(el){el.classList.remove("active");});
    div.classList.add("active");
    currentColor=c;
    drawPreview();
    drawShapePreviews();
  });
  colorRow.appendChild(div);
});

window.setStyleOpt=function(el,rowId){
  document.querySelectorAll("#"+rowId+" .toggle-btn").forEach(function(b){b.classList.remove("active");});
  el.classList.add("active");
  currentBorder=parseInt(el.dataset.val);
  drawPreview();
  drawShapePreviews();
};

window.onNameChange=function(){
  drawPreview();
  drawShapePreviews();
};

function getName(){return document.getElementById("nameInput").value||"홍길동";}

// Shape drawing functions
function drawCircle(ctx,size,name,font,color,border){
  var r=size/2-border;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  ctx.beginPath();ctx.arc(size/2,size/2,r,0,Math.PI*2);ctx.stroke();
  // inner circle
  ctx.lineWidth=border*0.5;
  ctx.beginPath();ctx.arc(size/2,size/2,r-border*2,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=color;
  ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=name.split("");
  var len=chars.length;
  var fSize=Math.floor(r*0.7/Math.max(len,1));
  ctx.font=font.weight+" "+fSize+"px "+font.family;
  if(len===1){
    ctx.fillText(chars[0],size/2,size/2);
  }else{
    var totalH=fSize*len*0.9;
    var startY=size/2-totalH/2+fSize*0.45;
    for(var i=0;i<len;i++){
      ctx.fillText(chars[i],size/2,startY+i*fSize*0.9);
    }
  }
}

function drawEllipse(ctx,size,name,font,color,border){
  var rx=size/2-border;
  var ry=size*0.38-border;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  ctx.beginPath();ctx.ellipse(size/2,size/2,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.lineWidth=border*0.5;
  ctx.beginPath();ctx.ellipse(size/2,size/2,rx-border*2,ry-border*2,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=color;ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=name.split("");
  var fSize=Math.floor(ry*0.8);
  ctx.font=font.weight+" "+fSize+"px "+font.family;
  var totalW=fSize*chars.length*0.7;
  var startX=size/2-totalW/2+fSize*0.35;
  for(var i=0;i<chars.length;i++){
    ctx.fillText(chars[i],startX+i*fSize*0.7,size/2);
  }
}

function drawSquare(ctx,size,name,font,color,border){
  var m=border;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  ctx.strokeRect(m,m,size-m*2,size-m*2);
  ctx.lineWidth=border*0.5;
  ctx.strokeRect(m+border*2,m+border*2,size-m*2-border*4,size-m*2-border*4);
  ctx.fillStyle=color;ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=name.split("");
  var len=chars.length;
  var fSize=Math.floor((size-m*4)*0.6/Math.max(len,1));
  ctx.font=font.weight+" "+fSize+"px "+font.family;
  if(len<=2){
    var totalW=fSize*len*0.8;
    var startX=size/2-totalW/2+fSize*0.4;
    for(var i=0;i<len;i++)ctx.fillText(chars[i],startX+i*fSize*0.8,size/2);
  }else{
    var totalH=fSize*len*0.85;
    var startY=size/2-totalH/2+fSize*0.42;
    for(var i=0;i<len;i++)ctx.fillText(chars[i],size/2,startY+i*fSize*0.85);
  }
}

function drawRoundSquare(ctx,size,name,font,color,border){
  var m=border;var r=size*0.12;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  roundRect(ctx,m,m,size-m*2,size-m*2,r);ctx.stroke();
  ctx.lineWidth=border*0.5;
  roundRect(ctx,m+border*2,m+border*2,size-m*2-border*4,size-m*2-border*4,r*0.7);ctx.stroke();
  ctx.fillStyle=color;ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=name.split("");var len=chars.length;
  var fSize=Math.floor((size-m*4)*0.6/Math.max(len,1));
  ctx.font=font.weight+" "+fSize+"px "+font.family;
  var totalH=fSize*len*0.85;
  var startY=size/2-totalH/2+fSize*0.42;
  for(var i=0;i<len;i++)ctx.fillText(chars[i],size/2,startY+i*fSize*0.85);
}

function drawApproval(ctx,size,name,font,color,border){
  var m=border;var w=size-m*2;var h=size-m*2;
  var rowH=h/3;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  ctx.strokeRect(m,m,w,h);
  ctx.beginPath();ctx.moveTo(m,m+rowH);ctx.lineTo(m+w,m+rowH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(m,m+rowH*2);ctx.lineTo(m+w,m+rowH*2);ctx.stroke();
  ctx.fillStyle=color;ctx.textAlign="center";ctx.textBaseline="middle";
  var fSmall=Math.floor(rowH*0.45);
  var fBig=Math.floor(rowH*0.55);
  ctx.font=font.weight+" "+fSmall+"px "+font.family;
  ctx.fillText("결 재",size/2,m+rowH*0.5);
  ctx.font=font.weight+" "+fBig+"px "+font.family;
  ctx.fillText(name,size/2,m+rowH*1.5);
  ctx.font=font.weight+" "+fSmall*0.8+"px "+font.family;
  var today=new Date();
  var dateStr=(today.getMonth()+1)+"/"+today.getDate();
  ctx.fillText(dateStr,size/2,m+rowH*2.5);
}

function drawRect(ctx,size,name,font,color,border){
  var m=border;var w=size-m*2;var h=size*0.5;var y0=(size-h)/2;
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle=color;ctx.lineWidth=border;
  ctx.strokeRect(m,y0,w,h);
  ctx.lineWidth=border*0.5;
  ctx.strokeRect(m+border*2,y0+border*2,w-border*4,h-border*4);
  ctx.fillStyle=color;ctx.textAlign="center";ctx.textBaseline="middle";
  var chars=name.split("");
  var fSize=Math.floor(h*0.5);
  ctx.font=font.weight+" "+fSize+"px "+font.family;
  var totalW=fSize*chars.length*0.75;
  var startX=size/2-totalW/2+fSize*0.375;
  for(var i=0;i<chars.length;i++)ctx.fillText(chars[i],startX+i*fSize*0.75,size/2);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawShapePreviews(){
  var name=getName().substring(0,2)||"홍길";
  var font=FONTS[currentFont];
  document.querySelectorAll(".shape-canvas").forEach(function(canvas,i){
    var ctx=canvas.getContext("2d");
    var s=SHAPES[i];
    s.draw(ctx,80,name,font,currentColor,2);
  });
}

function drawPreview(){
  var size=parseInt(document.getElementById("sizeSlider").value);
  var canvas=document.getElementById("previewCanvas");
  canvas.width=size;canvas.height=size;
  var ctx=canvas.getContext("2d");
  var name=getName();
  var font=FONTS[currentFont];
  var shape=SHAPES.find(function(s){return s.id===currentShape;});
  if(shape)shape.draw(ctx,size,name,font,currentColor,currentBorder);
}

window.downloadStamp=function(format){
  var size=parseInt(document.getElementById("sizeSlider").value);
  var canvas=document.createElement("canvas");
  canvas.width=size;canvas.height=size;
  var ctx=canvas.getContext("2d");
  if(format==="jpg"){
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,size,size);
  }
  var name=getName();
  var font=FONTS[currentFont];
  var shape=SHAPES.find(function(s){return s.id===currentShape;});
  if(shape)shape.draw(ctx,size,name,font,currentColor,currentBorder);
  var ext=format==="jpg"?"jpeg":"png";
  canvas.toBlob(function(blob){
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="stamp_"+getName()+"."+format;
    a.click();
  },"image/"+ext,0.95);
};

// Init after fonts load
setTimeout(function(){drawPreview();drawShapePreviews();},500);
setTimeout(function(){drawPreview();drawShapePreviews();},1500);
})();
</script>
