<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta property="og:title" content="닉네임 생성기 - 랜덤 닉네임 추천 | modutools">
<meta property="og:description" content="게임·SNS용 랜덤 닉네임 즉시 생성. 한글, 영문, 혼합 스타일 지원.">

<link rel="stylesheet" href="/css/common.css">
<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.toggle-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toggle-btn{flex:1;padding:10px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;transition:.2s;background:#fff;font-family:inherit;color:var(--g700);min-width:80px}
.toggle-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.toggle-btn:hover:not(.active){border-color:var(--g300)}
.calc-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.calc-btn:hover{background:var(--primary-dark)}
.calc-btn:active{transform:scale(.98)}
.nick-list{margin-top:4px}
.nick-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--g50);border:1px solid var(--g200);border-radius:10px;margin-bottom:8px;transition:.2s}
.nick-item:hover{border-color:var(--primary);background:var(--primary-light)}
.nick-name{font-size:16px;font-weight:700;color:var(--g900)}
.nick-copy{padding:6px 14px;border:1px solid var(--g200);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--g500);font-family:inherit;transition:.2s}
.nick-copy:hover{border-color:var(--primary);color:var(--primary)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--g900);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:480px){.toggle-btn{min-width:60px;font-size:12px;padding:8px}}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"닉네임 생성기","url":"https://modutools.com/generate/nickname.html","description":"게임, SNS용 랜덤 닉네임을 즉시 생성하는 무료 온라인 도구","applicationCategory":"UtilityApplication","operatingSystem":"All","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"}}
</script>
</head>
<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">닉네임 생성기</h1>
<p class="page-sub">게임·SNS·커뮤니티에서 사용할 랜덤 닉네임을 추천합니다</p>

<div class="card">
<div class="card-title">🏷️ 스타일 선택</div>
<div class="toggle-row" id="styleRow">
<div class="toggle-btn active" data-style="korean" onclick="setStyle(this)">🇰🇷 한글</div>
<div class="toggle-btn" data-style="english" onclick="setStyle(this)">🔤 영문</div>
<div class="toggle-btn" data-style="mixed" onclick="setStyle(this)">🔀 혼합</div>
<div class="toggle-btn" data-style="cool" onclick="setStyle(this)">😎 간지</div>
</div>

<div class="card-title">🎯 느낌 선택</div>
<div class="toggle-row" id="vibeRow">
<div class="toggle-btn active" data-vibe="cute" onclick="setVibe(this)">귀여운</div>
<div class="toggle-btn" data-vibe="strong" onclick="setVibe(this)">강한</div>
<div class="toggle-btn" data-vibe="funny" onclick="setVibe(this)">웃긴</div>
<div class="toggle-btn" data-vibe="mysterious" onclick="setVibe(this)">신비한</div>
</div>

<button class="calc-btn" onclick="generate()">🎲 닉네임 10개 생성</button>
</div>

<div id="resultArea" style="display:none">
<div class="card">
<div class="card-title">✨ 추천 닉네임</div>
<div class="nick-list" id="nickList"></div>
<button class="calc-btn" onclick="generate()" style="margin-top:4px">🔄 다시 생성</button>
</div>
</div>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<div class="toast" id="toast"></div>
<script>
let currentStyle='korean',currentVibe='cute';
function setStyle(el){document.querySelectorAll('#styleRow .toggle-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');currentStyle=el.dataset.style;}
function setVibe(el){document.querySelectorAll('#vibeRow .toggle-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');currentVibe=el.dataset.vibe;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randNum(){return Math.floor(Math.random()*900)+100;}

const KO={
  cute:{adj:['귀여운','깜찍한','쪼꼬미','말랑','포근한','몽글','살짝','소담한','달콤한','보들'],noun:['고양이','토끼','구름','별님','꿈돌이','솜사탕','딸기','푸딩','마카롱','젤리','햄찌','곰돌이','달토끼','피치','체리']},
  strong:{adj:['불꽃','강철','번개','폭풍','천둥','용맹','무적','최강','전설의','다크'],noun:['전사','기사','드래곤','호랑이','매','독수리','늑대','사자','검왕','마왕','흑룡','태풍','섬광','진격']},
  funny:{adj:['졸린','배고픈','멍때린','뒹구는','삐진','헤롱','날아간','비실비실','방전된','어질어질'],noun:['감자','고구마','참치','두부','짱구','오뎅','떡볶이','치킨','라면','족발','김밥','핫도그','만두']},
  mysterious:{adj:['은빛','새벽','고요한','안개속','달빛','그림자','몽환의','심연의','영원한','미지의'],noun:['여우','까마귀','유령','달그림자','안개꽃','무명','별수집가','몽유자','이방인','방랑자']}
};
const EN={
  cute:{adj:['Tiny','Baby','Little','Sweet','Fluffy','Soft','Mini','Cozy','Snowy','Peachy'],noun:['Bunny','Kitty','Cloud','Star','Mochi','Cookie','Berry','Panda','Chick','Meow']},
  strong:{adj:['Dark','Iron','Storm','Fire','Shadow','Steel','Thunder','Savage','Blade','Grim'],noun:['Wolf','Knight','Dragon','Tiger','Hawk','Viper','Phoenix','Reaper','Titan','Hunter']},
  funny:{adj:['Lazy','Sleepy','Clumsy','Dizzy','Grumpy','Salty','Soggy','Wonky','Goofy','Derpy'],noun:['Potato','Noodle','Taco','Pickle','Waffle','Nugget','Tofu','Burrito','Muffin','Donut']},
  mysterious:{adj:['Silent','Void','Astral','Lunar','Phantom','Mystic','Ethereal','Crimson','Obsidian','Arcane'],noun:['Raven','Specter','Wraith','Oracle','Nomad','Cipher','Mirage','Shade','Whisper','Echo']}
};
const COOL_PREFIX=['xX','★','◆','▶','†','Ω','∞','◈'];
const COOL_SUFFIX=['Xx','★','◆','◀','†','™','✦','◈'];

function genOne(){
  const ko=KO[currentVibe],en=EN[currentVibe];
  if(currentStyle==='korean')return pick(ko.adj)+pick(ko.noun);
  if(currentStyle==='english')return pick(en.adj)+pick(en.noun)+randNum();
  if(currentStyle==='mixed'){
    return Math.random()>0.5?pick(ko.adj)+pick(en.noun)+Math.floor(Math.random()*100):pick(en.adj)+pick(ko.noun);
  }
  if(currentStyle==='cool'){
    const base=Math.random()>0.5?pick(en.adj)+pick(en.noun):pick(ko.adj)+pick(ko.noun);
    return pick(COOL_PREFIX)+base+pick(COOL_SUFFIX);
  }
  return '';
}

function generate(){
  const list=document.getElementById('nickList');
  list.innerHTML='';
  const seen=new Set();
  let count=0;
  while(count<10){
    const nick=genOne();
    if(!seen.has(nick)){
      seen.add(nick);
      list.innerHTML+=`<div class="nick-item"><span class="nick-name">${nick}</span><button class="nick-copy" onclick="copyNick(this,'${nick.replace(/'/g,"\\'")}')">복사</button></div>`;
      count++;
    }
  }
  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}

function copyNick(btn,nick){
  navigator.clipboard.writeText(nick).then(()=>{btn.textContent='✓ 복사됨';setTimeout(()=>btn.textContent='복사',1500);});
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
</body>
</html>
