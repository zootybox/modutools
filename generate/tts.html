<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>무료 TTS 음성 변환 및 저장 - 모두의 도구 | modutools</title>
<link rel="stylesheet" href="/css/common.css">
<style>
/* 기존 상세 페이지 규격 반영 */
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}

/* 카드 및 입력창 최적화 */
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.input-label{font-size:13px;font-weight:600;color:var(--g600);margin-bottom:8px;display:block}
.tts-textarea {
    width: 100%; min-height: 180px; padding: 16px;
    border: 1px solid var(--g200); border-radius: var(--radius);
    font-size: 15px; line-height: 1.6; background: #fdfdfd; resize: none; margin-bottom: 20px;
}
.tts-textarea:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

/* 설정 슬라이더 (BMI 스타일) */
.setting-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.range-card { background: var(--g50); padding: 16px; border-radius: var(--radius); }
.range-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; color: var(--g500); }
.range-header b { color: var(--g900); font-weight: 700; }
input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }

/* 버튼 디자인 개선 */
.btn-area { display: flex; gap: 8px; }
.btn-sub { flex: 1; background: var(--g100); color: var(--g800); font-weight: 600; }
.btn-main { flex: 1.5; background: var(--primary); color: #fff; font-weight: 700; }
.mt-btn:hover { opacity: 0.9; transform: translateY(-1px); transition: all 0.2s; }

/* 상태 알림 레이어 */
#statusMsg { 
    margin-top: 16px; padding: 12px; border-radius: var(--radius); 
    background: #eff6ff; color: var(--primary); font-size: 13px; 
    text-align: center; font-weight: 600; display: none; 
}
.mt-guide{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-top:16px}
.mt-guide h2{font-size:17px;font-weight:700;margin-bottom:12px;color:var(--g900)}
.mt-guide h3{font-size:14px;font-weight:700;margin:18px 0 8px;color:var(--primary)}
.mt-guide p{font-size:13.5px;line-height:1.8;color:var(--g700);margin-bottom:10px}
.mt-faq{margin-top:16px}
.mt-faq-item{background:#fff;border:1px solid var(--g200);border-radius:12px;margin-bottom:8px;overflow:hidden}
.mt-faq-q{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.mt-faq-q::after{content:'▼';font-size:11px;color:var(--g400);transition:transform .2s}
.mt-faq-item.open .mt-faq-q::after{transform:rotate(180deg)}
.mt-faq-a{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;font-size:13.5px;color:var(--g600);line-height:1.8}
.mt-faq-item.open .mt-faq-a{max-height:600px;padding:0 16px 14px}
.mt-note{font-size:12px;color:var(--g400);text-align:center;margin-top:14px;line-height:1.6}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[
{"@type":"Question","name":"TTS 음성 변환은 어떤 언어를 지원하나요?","acceptedAnswer":{"@type":"Answer","text":"브라우저에 내장된 음성 엔진을 사용하며, 한국어와 영어를 포함해 브라우저가 지원하는 다양한 언어로 텍스트를 읽어줍니다."}},
{"@type":"Question","name":"생성된 음성을 파일로 저장할 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"브라우저 Web Speech API를 사용하므로 직접 파일 저장은 지원하지 않습니다. 녹음 앱을 함께 사용하면 저장이 가능합니다."}},
{"@type":"Question","name":"음성 속도를 조절할 수 있나요?","acceptedAnswer":{"@type":"Answer","text":"네, 속도와 높낮이를 슬라이더로 조절할 수 있습니다. 느리게 들으면서 발음을 확인하거나 빠르게 들을 수 있습니다."}},
{"@type":"Question","name":"입력한 텍스트가 서버에 전송되나요?","acceptedAnswer":{"@type":"Answer","text":"아닙니다. 브라우저 내장 음성 합성 기능을 사용하므로 텍스트가 외부 서버로 전송되지 않습니다."}}
]}
</script>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">modutools</a>
    </div>
</header>

<main class="page">
    <h1 class="page-title">TTS 음성 변환</h1>
    <p class="page-sub">텍스트를 입력하고 원하는 목소리로 변환하여 소장해 보세요.</p>

    <div class="card">
        <label class="input-label">내용 입력</label>
        <textarea id="ttsInput" class="tts-textarea" placeholder="읽어줄 내용을 입력하세요..."></textarea>

        <div class="input-group" style="margin-bottom: 20px;">
            <label class="input-label">목소리 선택 (성별/언어)</label>
            <select id="voiceSelect" class="mt-input" style="width: 100%; border-color: var(--g200);"></select>
        </div>

        <div class="setting-grid">
            <div class="range-card">
                <div class="range-header"><span>속도</span><b id="speedVal">1.0</b></div>
                <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1.0">
            </div>
            <div class="range-card">
                <div class="range-header"><span>톤</span><b id="pitchVal">1.0</b></div>
                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1.0">
            </div>
        </div>

        <div class="btn-area">
            <button onclick="preview()" class="mt-btn btn-sub">미리 듣기</button>
            <button onclick="download()" class="mt-btn btn-main">음성 파일 저장</button>
        </div>

        <div id="statusMsg">✨ 현재 음성을 녹음하여 파일로 변환 중입니다...</div>
    </div>

    <div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
</main>

<script>
const synth = window.speechSynthesis;
const voiceSelect = document.getElementById('voiceSelect');
const speedIn = document.getElementById('speed');
const pitchIn = document.getElementById('pitch');
let voices = [];

function loadVoices() {
    voices = synth.getVoices();
    voiceSelect.innerHTML = voices
        .filter(v => v.lang.includes('ko') || v.lang.includes('en'))
        .map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`)
        .join('');
}
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}
loadVoices();

speedIn.oninput = (e) => document.getElementById('speedVal').textContent = e.target.value;
pitchIn.oninput = (e) => document.getElementById('pitchVal').textContent = e.target.value;

function preview() {
    if (synth.speaking) synth.cancel();
    const text = document.getElementById('ttsInput').value;
    if (!text) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = voices.find(v => v.name === voiceSelect.value);
    utter.rate = speedIn.value;
    utter.pitch = pitchIn.value;
    synth.speak(utter);
}

async function download() {
    const text = document.getElementById('ttsInput').value;
    if (!text) return;
    if (synth.speaking) synth.cancel();

    const status = document.getElementById('statusMsg');
    status.style.display = 'block';

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = audioCtx.createMediaStreamDestination();
    const recorder = new MediaRecorder(dest.stream);
    const chunks = [];

    recorder.ondataavailable = (e) => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `modutools-tts-${Date.now()}.wav`;
        a.click();
        status.style.display = 'none';
        audioCtx.close();
    };

    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = voices.find(v => v.name === voiceSelect.value);
    utter.rate = speedIn.value;
    utter.pitch = pitchIn.value;

    recorder.start();
    synth.speak(utter);
    utter.onend = () => { setTimeout(() => recorder.stop(), 500); };
}
</script>
</body>
</html>
