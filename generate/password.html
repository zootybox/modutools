<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">비밀번호 생성기</h1>
<p class="page-sub">안전한 랜덤 비밀번호를 즉시 생성합니다</p>

<div class="card">
<div class="card-title">🔐 생성된 비밀번호</div>
<div class="pw-display" id="pwDisplay">-</div>
<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
<div class="strength-text" id="strengthText"></div>
<div class="pw-actions">
<button class="pw-btn" onclick="copyPw()">📋 복사</button>
<button class="pw-btn primary" onclick="generate()">🔄 새로 생성</button>
</div>
</div>

<div class="card">
<div class="card-title">⚙️ 설정</div>
<div class="input-group">
<div class="input-label">비밀번호 길이 <span id="lenValue">16</span>자</div>
<input type="range" class="range-input" id="pwLength" min="4" max="64" value="16" oninput="updateLen()">
</div>
<div class="option-row">
<label class="option-label"><input type="checkbox" id="optUpper" checked onchange="generate()"> 대문자 (A-Z)</label>
<label class="option-label"><input type="checkbox" id="optLower" checked onchange="generate()"> 소문자 (a-z)</label>
</div>
<div class="option-row">
<label class="option-label"><input type="checkbox" id="optNumber" checked onchange="generate()"> 숫자 (0-9)</label>
<label class="option-label"><input type="checkbox" id="optSpecial" checked onchange="generate()"> 특수문자 (!@#$)</label>
</div>
<div class="input-group" style="margin-top:12px">
<div class="input-label">한번에 여러 개 생성 <span id="countValue">1</span>개</div>
<input type="range" class="range-input" id="pwCount" min="1" max="10" value="1" oninput="updateCount()">
</div>
</div>

<div id="multiArea" style="display:none">
<div class="card">
<div class="card-title">📋 생성 목록</div>
<div class="multi-list" id="multiList"></div>
</div>
</div>

<p class="disclaimer">⚠️ 본 도구는 참고용이며, 생성된 비밀번호의 보안에 대해 보증하지 않습니다.<br>중요한 계정에는 2단계 인증을 함께 사용하시기 바랍니다.</p>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<div class="toast" id="toast"></div>
<script>
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LOWER='abcdefghijklmnopqrstuvwxyz';
const NUMBERS='0123456789';
const SPECIAL='!@#$%^&*()_+-=[]{}|;:,.<>?';

function getCharset(){
  let cs='';
  if(document.getElementById('optUpper').checked)cs+=UPPER;
  if(document.getElementById('optLower').checked)cs+=LOWER;
  if(document.getElementById('optNumber').checked)cs+=NUMBERS;
  if(document.getElementById('optSpecial').checked)cs+=SPECIAL;
  return cs;
}

function genOne(len,charset){
  if(!charset)return '';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr,v=>charset[v%charset.length]).join('');
}

function getStrength(pw){
  let score=0;
  if(pw.length>=8)score++;if(pw.length>=12)score++;if(pw.length>=16)score++;
  if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))score++;
  if(/\d/.test(pw))score++;
  if(/[^a-zA-Z0-9]/.test(pw))score++;
  if(score<=2)return{level:'약함',color:'#EF4444',pct:25};
  if(score<=3)return{level:'보통',color:'#EAB308',pct:50};
  if(score<=4)return{level:'강함',color:'#22C55E',pct:75};
  return{level:'매우 강함',color:'#16A34A',pct:100};
}

function generate(){
  const charset=getCharset();
  if(!charset){alert('최소 하나의 문자 유형을 선택해주세요.');return;}
  const len=parseInt(document.getElementById('pwLength').value);
  const count=parseInt(document.getElementById('pwCount').value);
  const pw=genOne(len,charset);
  document.getElementById('pwDisplay').textContent=pw;
  const s=getStrength(pw);
  document.getElementById('strengthFill').style.width=s.pct+'%';
  document.getElementById('strengthFill').style.background=s.color;
  document.getElementById('strengthText').textContent='보안 강도: '+s.level;
  document.getElementById('strengthText').style.color=s.color;
  if(count>1){
    const list=document.getElementById('multiList');
    list.innerHTML='';
    for(let i=0;i<count;i++){
      const p=i===0?pw:genOne(len,charset);
      list.innerHTML+=`<div class="multi-item"><span class="num">${i+1}</span><span class="pw">${p}</span><button class="copy" onclick="copyOne(this,'${p}')">복사</button></div>`;
    }
    document.getElementById('multiArea').style.display='block';
  }else{
    document.getElementById('multiArea').style.display='none';
  }
}

function updateLen(){
  document.getElementById('lenValue').textContent=document.getElementById('pwLength').value;
  generate();
}
function updateCount(){
  document.getElementById('countValue').textContent=document.getElementById('pwCount').value;
  generate();
}
function copyPw(){
  const pw=document.getElementById('pwDisplay').textContent;
  if(!pw||pw==='-')return;
  navigator.clipboard.writeText(pw).then(()=>showToast('비밀번호를 복사했습니다'));
}
function copyOne(btn,pw){
  navigator.clipboard.writeText(pw).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='복사',1500);});
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

generate();
</script>
</body>
