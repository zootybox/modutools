.toggle-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.calc-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}

.result-area{display:none}
.result-big{text-align:center;padding:20px 0}

.result-date-box .date{font-size:22px;font-weight:800;color:var(--primary)}
.result-date-box .day{font-size:14px;color:var(--g500);margin-top:4px}

@media(max-width:480px){.result-number{font-size:34px}.detail-grid{grid-template-columns:repeat(3,1fr);gap:6px}.detail-value{font-size:15px}.tab-btn{font-size:12px;padding:10px}}
.mt-guide{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-top:16px}
.mt-guide h2{font-size:17px;font-weight:700;margin-bottom:12px;color:var(--g900)}
.mt-guide h3{font-size:14px;font-weight:700;margin:18px 0 8px;color:var(--primary)}
.mt-guide p{font-size:13.5px;line-height:1.8;color:var(--g700);margin-bottom:10px}
.mt-faq{margin-top:16px}
.mt-faq-item{background:#fff;border:1px solid var(--g200);border-radius:12px;margin-bottom:8px;overflow:hidden}
.mt-faq-q{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.mt-faq-q::after{content:'▼';font-size:11px;color:var(--g400);transition:transform .2s}
.mt-faq-item.open .mt-faq-q::after{transform:rotate(180deg)}
.mt-faq-a{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;font-size:13.5px;color:var(--g600);line-height:1.8}
.mt-faq-item.open .mt-faq-a{max-height:600px;padding:0 16px 14px}
.mt-note{font-size:12px;color:var(--g400);text-align:center;margin-top:14px;line-height:1.6}
</style>

<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">날짜 계산기</h1>
<p class="page-sub">D-Day, 날짜 차이, 날짜 더하기/빼기를 계산합니다</p>

<div class="tab-row" id="mainTab">
<button class="tab-btn active" data-tab="diff" onclick="switchTab(this)">📅 두 날짜 차이</button>
<button class="tab-btn" data-tab="add" onclick="switchTab(this)">➕ 날짜 더하기/빼기</button>
</div>

<!-- 두 날짜 차이 -->
<div class="tab-content active" id="tab-diff">
<div class="card">
<div class="card-title">📅 날짜 입력</div>
<div class="input-group">
<label class="input-label">시작 날짜</label>
<input type="date" class="input-field" id="diffStart">
</div>
<div class="input-group">
<label class="input-label">종료 날짜</label>
<input type="date" class="input-field" id="diffEnd">
</div>
<button class="calc-btn" onclick="calcDiff()">계산하기</button>
</div>
<div class="result-area" id="diffResult">
<div class="card">
<div class="card-title">📊 계산 결과</div>
<div class="result-big">
<div class="result-number" id="diffDays">-</div>
<div class="result-label">일</div>
<div class="result-sub" id="diffSub"></div>
</div>
<div class="detail-grid">
<div class="detail-box"><div class="detail-value" id="diffYears">-</div><div class="detail-label">년</div></div>
<div class="detail-box"><div class="detail-value" id="diffMonths">-</div><div class="detail-label">개월</div></div>
<div class="detail-box"><div class="detail-value" id="diffWeeks">-</div><div class="detail-label">주</div></div>
</div>
</div>
</div>
</div>

<!-- 날짜 더하기/빼기 -->
<div class="tab-content" id="tab-add">
<div class="card">
<div class="card-title">📅 날짜 입력</div>
<div class="input-group">
<label class="input-label">기준 날짜</label>
<input type="date" class="input-field" id="addBase">
</div>
<div class="input-group">
<label class="input-label">더하기/빼기</label>
<div class="toggle-row">
<div class="toggle-btn active" data-dir="add" onclick="setDir(this)">➕ 더하기</div>
<div class="toggle-btn" data-dir="sub" onclick="setDir(this)">➖ 빼기</div>
</div>
</div>
<div class="input-group">
<label class="input-label">일수</label>
<div class="input-row">
<input type="number" class="input-field" id="addDays" value="100" min="0" inputmode="numeric" style="text-align:right">
<span class="input-unit">일</span>
</div>
</div>
<button class="calc-btn" onclick="calcAdd()">계산하기</button>
</div>
<div class="result-area" id="addResult">
<div class="card">
<div class="card-title">📊 계산 결과</div>
<div class="result-date-box">
<div class="date" id="addResultDate">-</div>
<div class="day" id="addResultDay">-</div>
</div>
<div class="result-big" style="padding-top:16px">
<div class="result-sub" id="addResultSub"></div>
</div>
</div>
</div>
</div>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<script>
const DAYS=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
let addDir='add';

// 오늘 날짜 기본값
const todayStr=new Date().toISOString().split('T')[0];
document.getElementById('diffStart').value=todayStr;
document.getElementById('diffEnd').value=todayStr;
document.getElementById('addBase').value=todayStr;

function switchTab(btn){
  document.querySelectorAll('#mainTab .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
}
function setDir(el){
  document.querySelectorAll('[data-dir]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  addDir=el.dataset.dir;
}

function calcDiff(){
  const s=new Date(document.getElementById('diffStart').value);
  const e=new Date(document.getElementById('diffEnd').value);
  if(isNaN(s)||isNaN(e)){alert('날짜를 입력해주세요.');return;}

  const diffMs=e.getTime()-s.getTime();
  const diffDays=Math.round(diffMs/(1000*60*60*24));
  const absDays=Math.abs(diffDays);

  document.getElementById('diffDays').textContent=absDays.toLocaleString();
  document.getElementById('diffSub').textContent=
    formatDate(s)+' ~ '+formatDate(e)+(diffDays<0?' (과거)':'');

  const weeks=Math.floor(absDays/7);
  const totalMonths=monthDiff(s,e);
  const years=Math.floor(totalMonths/12);

  document.getElementById('diffYears').textContent=years;
  document.getElementById('diffMonths').textContent=totalMonths;
  document.getElementById('diffWeeks').textContent=weeks;

  document.getElementById('diffResult').style.display='block';
  document.getElementById('diffResult').scrollIntoView({behavior:'smooth'});
}

function calcAdd(){
  const base=new Date(document.getElementById('addBase').value);
  const days=parseInt(document.getElementById('addDays').value)||0;
  if(isNaN(base)){alert('날짜를 입력해주세요.');return;}

  const result=new Date(base);
  if(addDir==='add')result.setDate(result.getDate()+days);
  else result.setDate(result.getDate()-days);

  document.getElementById('addResultDate').textContent=formatDate(result);
  document.getElementById('addResultDay').textContent=DAYS[result.getDay()];

  const fromToday=Math.round((result.getTime()-new Date().getTime())/(1000*60*60*24));
  let sub='오늘 기준 ';
  if(fromToday>0)sub+='D-'+fromToday;
  else if(fromToday<0)sub+=Math.abs(fromToday)+'일 전';
  else sub+='오늘';
  document.getElementById('addResultSub').textContent=sub;

  document.getElementById('addResult').style.display='block';
  document.getElementById('addResult').scrollIntoView({behavior:'smooth'});
}

function formatDate(d){
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DAYS[d.getDay()]+')';
}
function monthDiff(a,b){
  let months=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate())months--;
  return Math.abs(months);
}
</script>
</body>
