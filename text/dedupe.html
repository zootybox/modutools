<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>중복 줄 제거 - 텍스트 중복 라인 삭제 | modutools</title>
<meta name="description" content="텍스트에서 중복된 줄을 자동으로 제거합니다. 순서 유지, 빈 줄 제거 옵션 지원. 엑셀 데이터 정리, 이메일 목록 정리에 유용합니다.">
<meta property="og:title" content="중복 줄 제거 - 텍스트 중복 라인 삭제 | modutools">
<meta property="og:description" content="중복된 줄을 자동 제거. 순서 유지, 빈 줄 제거 옵션 지원.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://modutools.com/text/dedupe.html">
<link rel="canonical" href="https://modutools.com/text/dedupe.html">
<link rel="stylesheet" href="/css/common.css">
<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.text-area{width:100%;min-height:180px;border:1.5px solid var(--g200);border-radius:10px;padding:14px;font-size:14px;font-family:inherit;line-height:1.7;resize:vertical;outline:none;transition:.2s;background:#fff;color:var(--g900)}
.text-area:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.text-area::placeholder{color:var(--g400)}
.option-row{display:flex;gap:16px;margin:12px 0;flex-wrap:wrap}
.option-label{font-size:13px;color:var(--g700);display:flex;align-items:center;gap:6px;cursor:pointer}
.option-label input{width:16px;height:16px;cursor:pointer}
.calc-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.calc-btn:hover{background:var(--primary-dark)}
.calc-btn:active{transform:scale(.98)}
.result-info{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.info-badge{font-size:13px;color:var(--g500);background:var(--g100);padding:4px 12px;border-radius:6px}
.info-badge strong{color:var(--primary)}
.copy-btn{padding:10px 20px;border:1px solid var(--g200);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;color:var(--g700);transition:.2s}
.copy-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--g900);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:480px){.text-area{min-height:140px;font-size:13px}}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"중복 줄 제거","url":"https://modutools.com/text/dedupe.html","description":"텍스트에서 중복된 줄을 자동으로 제거하는 무료 온라인 도구","applicationCategory":"UtilityApplication","operatingSystem":"All","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"}}
</script>
</head>
<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">중복 줄 제거</h1>
<p class="page-sub">텍스트에서 중복된 줄을 자동으로 찾아 제거합니다</p>
<div class="card">
<div class="card-title">📝 텍스트 입력</div>
<textarea class="text-area" id="inputText" placeholder="여기에 텍스트를 입력하거나 붙여넣기 하세요...&#10;중복된 줄이 자동으로 제거됩니다."></textarea>
<div class="option-row">
<label class="option-label"><input type="checkbox" id="optEmpty" checked> 빈 줄 제거</label>
<label class="option-label"><input type="checkbox" id="optTrim" checked> 앞뒤 공백 제거</label>
<label class="option-label"><input type="checkbox" id="optCase"> 대소문자 무시</label>
</div>
<button class="calc-btn" onclick="process()">중복 줄 제거하기</button>
</div>
<div id="resultArea" style="display:none">
<div class="card">
<div class="card-title">✅ 결과</div>
<div class="result-info">
<span class="info-badge">원본 <strong id="origCount">0</strong>줄</span>
<span class="info-badge">결과 <strong id="resultCount">0</strong>줄</span>
<span class="info-badge">제거 <strong id="removedCount">0</strong>줄</span>
</div>
<textarea class="text-area" id="outputText" readonly style="background:var(--g50)"></textarea>
<div style="margin-top:12px;text-align:right"><button class="copy-btn" onclick="copyResult()">📋 결과 복사</button></div>
</div>
</div>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<div class="toast" id="toast"></div>
<script>
function process(){
  const input=document.getElementById('inputText').value;
  if(!input.trim()){alert('텍스트를 입력해주세요.');return;}
  const optEmpty=document.getElementById('optEmpty').checked;
  const optTrim=document.getElementById('optTrim').checked;
  const optCase=document.getElementById('optCase').checked;
  let lines=input.split('\n');
  const origCount=lines.length;
  if(optTrim)lines=lines.map(l=>l.trim());
  if(optEmpty)lines=lines.filter(l=>l!=='');
  const seen=new Set();
  const result=[];
  for(const line of lines){
    const key=optCase?line.toLowerCase():line;
    if(!seen.has(key)){seen.add(key);result.push(line);}
  }
  document.getElementById('origCount').textContent=origCount;
  document.getElementById('resultCount').textContent=result.length;
  document.getElementById('removedCount').textContent=origCount-result.length;
  document.getElementById('outputText').value=result.join('\n');
  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}
function copyResult(){
  const t=document.getElementById('outputText').value;
  if(!t){showToast('복사할 내용이 없습니다');return;}
  navigator.clipboard.writeText(t).then(()=>showToast('클립보드에 복사했습니다'));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
</body>
</html>
