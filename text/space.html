<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공백 정리기 - 불필요한 공백·줄바꿈 제거 | modutools</title>
<meta name="description" content="텍스트의 불필요한 공백, 연속 줄바꿈, 탭 문자를 깔끔하게 정리합니다. 코드 정리, 문서 정리, 복사 붙여넣기 후 정리에 유용합니다.">
<meta property="og:title" content="공백 정리기 - 불필요한 공백·줄바꿈 제거 | modutools">
<meta property="og:description" content="불필요한 공백, 연속 줄바꿈, 탭 문자를 깔끔하게 정리.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://modutools.com/text/space.html">
<link rel="canonical" href="https://modutools.com/text/space.html">
<link rel="stylesheet" href="/css/common.css">
<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.text-area{width:100%;min-height:160px;border:1.5px solid var(--g200);border-radius:10px;padding:14px;font-size:14px;font-family:inherit;line-height:1.7;resize:vertical;outline:none;transition:.2s;background:#fff;color:var(--g900)}
.text-area:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.text-area::placeholder{color:var(--g400)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.convert-btn{padding:12px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;color:var(--g700);transition:.2s;text-align:left}
.convert-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.convert-btn:active{transform:scale(.97)}
.all-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.all-btn:hover{background:var(--primary-dark)}
.all-btn:active{transform:scale(.98)}
.result-info{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.info-badge{font-size:13px;color:var(--g500);background:var(--g100);padding:4px 12px;border-radius:6px}
.info-badge strong{color:var(--primary)}
.copy-btn{padding:10px 20px;border:1px solid var(--g200);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;color:var(--g700);transition:.2s}
.copy-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--g900);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(max-width:480px){.btn-grid{grid-template-columns:1fr 1fr;gap:6px}.convert-btn{padding:10px;font-size:12px}}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"공백 정리기","url":"https://modutools.com/text/space.html","description":"텍스트의 불필요한 공백, 줄바꿈, 탭을 정리하는 무료 온라인 도구","applicationCategory":"UtilityApplication","operatingSystem":"All","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"}}
</script>
</head>
<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">공백 정리기</h1>
<p class="page-sub">불필요한 공백, 줄바꿈, 탭 문자를 깔끔하게 정리합니다</p>
<div class="card">
<div class="card-title">📝 텍스트 입력</div>
<textarea class="text-area" id="textInput" placeholder="여기에 텍스트를 입력하거나 붙여넣기 하세요..."></textarea>
<div class="btn-grid">
<button class="convert-btn" onclick="clean('multiSpace')">🔹 연속 공백 → 1칸</button>
<button class="convert-btn" onclick="clean('multiLine')">🔹 연속 줄바꿈 → 1줄</button>
<button class="convert-btn" onclick="clean('trimLines')">🔹 각 줄 앞뒤 공백 제거</button>
<button class="convert-btn" onclick="clean('emptyLines')">🔹 빈 줄 모두 제거</button>
<button class="convert-btn" onclick="clean('tabs')">🔹 탭 → 공백 변환</button>
<button class="convert-btn" onclick="clean('allSpaces')">🔹 모든 공백 제거</button>
</div>
<button class="all-btn" onclick="clean('all')">✨ 한번에 전부 정리</button>
</div>
<div id="resultArea" style="display:none">
<div class="card">
<div class="card-title">✅ 정리 결과</div>
<div class="result-info">
<span class="info-badge">원본 <strong id="origLen">0</strong>자</span>
<span class="info-badge">결과 <strong id="resultLen">0</strong>자</span>
<span class="info-badge">제거 <strong id="removedLen">0</strong>자</span>
</div>
<textarea class="text-area" id="outputText" readonly style="background:var(--g50)"></textarea>
<div style="margin-top:12px;text-align:right"><button class="copy-btn" onclick="copyResult()">📋 결과 복사</button></div>
</div>
</div>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<div class="toast" id="toast"></div>
<script>
function clean(type){
  const input=document.getElementById('textInput').value;
  if(!input){alert('텍스트를 입력해주세요.');return;}
  let result=input;
  switch(type){
    case 'multiSpace':result=result.replace(/ {2,}/g,' ');break;
    case 'multiLine':result=result.replace(/\n{3,}/g,'\n\n');break;
    case 'trimLines':result=result.split('\n').map(l=>l.trim()).join('\n');break;
    case 'emptyLines':result=result.split('\n').filter(l=>l.trim()!=='').join('\n');break;
    case 'tabs':result=result.replace(/\t/g,'  ');break;
    case 'allSpaces':result=result.replace(/\s/g,'');break;
    case 'all':
      result=result.replace(/\t/g,' ');
      result=result.split('\n').map(l=>l.trim()).join('\n');
      result=result.replace(/ {2,}/g,' ');
      result=result.replace(/\n{3,}/g,'\n\n');
      result=result.split('\n').filter(l=>l.trim()!=='').join('\n');
      break;
  }
  document.getElementById('origLen').textContent=input.length.toLocaleString();
  document.getElementById('resultLen').textContent=result.length.toLocaleString();
  document.getElementById('removedLen').textContent=(input.length-result.length).toLocaleString();
  document.getElementById('outputText').value=result;
  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth'});
}
function copyResult(){
  const t=document.getElementById('outputText').value;
  if(!t){showToast('복사할 내용이 없습니다');return;}
  navigator.clipboard.writeText(t).then(()=>showToast('클립보드에 복사했습니다'));
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
</body>
</html>
