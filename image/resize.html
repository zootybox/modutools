<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>이미지 리사이즈 - 이미지 크기 변경 | modutools</title>
<meta name="description" content="이미지의 가로·세로 크기를 원하는 사이즈로 변경합니다. 비율 유지 옵션, 여러 장 일괄 처리 지원. 서버 전송 없이 브라우저에서 처리.">
<link rel="canonical" href="https://modutools.com/image/resize.html">
<link rel="stylesheet" href="/css/common.css">
<style>
.page{max-width:640px;margin:0 auto;padding:24px 20px 60px}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:28px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.upload-zone{border:2px dashed var(--g300);border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;background:var(--g50)}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone.active{border-color:var(--primary);background:var(--primary-light)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-text{font-size:14px;color:var(--g500)}
.upload-text strong{color:var(--primary)}
.file-input{display:none}
.input-group{margin-bottom:16px}
.input-label{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px;display:block}
.input-row{display:flex;gap:8px;align-items:center}
.input-field{flex:1;border:1.5px solid var(--g200);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;transition:.2s;text-align:center}
.input-field:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.input-sep{font-size:16px;color:var(--g400);font-weight:600}
.option-row{display:flex;gap:16px;margin:12px 0;flex-wrap:wrap}
.option-label{font-size:13px;color:var(--g700);display:flex;align-items:center;gap:6px;cursor:pointer}
.option-label input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.preset-btn{padding:6px 12px;border:1px solid var(--g200);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;color:var(--g500);transition:.2s}
.preset-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.calc-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:8px}
.calc-btn:hover{background:var(--primary-dark)}
.calc-btn:active{transform:scale(.98)}
.result-area{display:none}
.preview-wrap{text-align:center;margin-bottom:16px}
.preview-img{max-width:100%;max-height:300px;border-radius:10px;border:1px solid var(--g200)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--g100)}
.info-row .label{color:var(--g500)}
.info-row .value{font-weight:700;color:var(--g900)}
.download-btn{width:100%;padding:14px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:12px}
.download-btn:hover{background:var(--primary-dark)}
.disclaimer{font-size:11px;color:var(--g400);text-align:center;margin-top:16px;line-height:1.6}
@media(max-width:480px){.preset-row{gap:4px}.preset-btn{font-size:10px;padding:5px 8px}}
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"이미지 리사이즈","url":"https://modutools.com/image/resize.html","description":"이미지 크기를 원하는 사이즈로 변경하는 무료 온라인 도구","applicationCategory":"MultimediaApplication","operatingSystem":"All","offers":{"@type":"Offer","price":"0","priceCurrency":"KRW"}}
</script>
</head>
<body>
<header class="mt-header"><div class="mt-header-inner"><a href="/" class="mt-logo">modu<span>tools</span></a><nav class="mt-nav"><a href="/">← 도구 목록</a></nav></div></header>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<main class="page">
<h1 class="page-title">이미지 리사이즈</h1>
<p class="page-sub">이미지의 가로·세로 크기를 원하는 사이즈로 변경합니다</p>
<div class="card">
<div class="card-title">📐 이미지 업로드</div>
<div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
<div class="upload-icon">🖼️</div>
<div class="upload-text"><strong>클릭</strong> 또는 이미지를 드래그하여 업로드<br>JPG, PNG, WEBP, GIF 지원</div>
</div>
<input type="file" class="file-input" id="fileInput" accept="image/*">
</div>
<div id="settingsArea" style="display:none">
<div class="card">
<div class="card-title">⚙️ 크기 설정</div>
<div class="input-group">
<label class="input-label">원본 크기: <span id="origSize">-</span></label>
</div>
<div class="preset-row">
<button class="preset-btn" onclick="setPreset(50)">50%</button>
<button class="preset-btn" onclick="setPreset(75)">75%</button>
<button class="preset-btn" onclick="setPreset(150)">150%</button>
<button class="preset-btn" onclick="setPreset(200)">200%</button>
<button class="preset-btn" onclick="setSize(800,600)">800x600</button>
<button class="preset-btn" onclick="setSize(1920,1080)">1920x1080</button>
<button class="preset-btn" onclick="setSize(1080,1080)">1080x1080</button>
<button class="preset-btn" onclick="setSize(500,500)">500x500</button>
</div>
<div class="input-group">
<label class="input-label">변경 크기</label>
<div class="input-row">
<input type="number" class="input-field" id="newWidth" min="1" max="10000" inputmode="numeric">
<span class="input-sep">x</span>
<input type="number" class="input-field" id="newHeight" min="1" max="10000" inputmode="numeric">
<span style="font-size:13px;color:var(--g500)">px</span>
</div>
</div>
<div class="option-row">
<label class="option-label"><input type="checkbox" id="keepRatio" checked onchange="onRatioChange()"> 비율 유지</label>
</div>
<button class="calc-btn" onclick="doResize()">리사이즈 실행</button>
</div>
</div>
<div class="result-area" id="resultArea">
<div class="card">
<div class="card-title">✅ 리사이즈 결과</div>
<div class="preview-wrap"><img id="previewImg" class="preview-img"></div>
<div class="info-row"><span class="label">원본 크기</span><span class="value" id="infoOrig">-</span></div>
<div class="info-row"><span class="label">변경 크기</span><span class="value" id="infoNew">-</span></div>
<div class="info-row"><span class="label">파일 크기</span><span class="value" id="infoSize">-</span></div>
<button class="download-btn" onclick="downloadResult()">다운로드</button>
</div>
<p class="disclaimer">※ 모든 처리는 브라우저에서 이루어지며, 이미지가 서버로 전송되지 않습니다.</p>
</div>
</main>
<div class="mt-ad"><div class="mt-ad-box">광고 영역 (AD)</div></div>
<footer class="mt-footer"><p><a href="/">← modutools 전체 도구 보기</a><br>&copy; 2026 modutools.com — 모두를 위한 무료 온라인 도구</p></footer>
<script>
(function(){
var origImg=null;
var origW=0,origH=0,ratio=1;
var resultBlob=null,resultName="";

var fileInput=document.getElementById("fileInput");
var uploadZone=document.getElementById("uploadZone");
var widthIn=document.getElementById("newWidth");
var heightIn=document.getElementById("newHeight");

uploadZone.addEventListener("dragover",function(e){e.preventDefault();uploadZone.classList.add("active");});
uploadZone.addEventListener("dragleave",function(){uploadZone.classList.remove("active");});
uploadZone.addEventListener("drop",function(e){e.preventDefault();uploadZone.classList.remove("active");if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener("change",function(){if(this.files.length)loadFile(this.files[0]);});

function loadFile(file){
  if(!file.type.startsWith("image/")){alert("이미지 파일만 업로드 가능합니다.");return;}
  resultName=file.name.replace(/\.[^.]+$/,"")+"_resized";
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      origImg=img;origW=img.width;origH=img.height;
      ratio=origW/origH;
      document.getElementById("origSize").textContent=origW+" x "+origH+" px";
      widthIn.value=origW;heightIn.value=origH;
      document.getElementById("settingsArea").style.display="block";
      document.getElementById("resultArea").style.display="none";
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

widthIn.addEventListener("input",function(){
  if(document.getElementById("keepRatio").checked&&origImg){
    heightIn.value=Math.round(parseInt(widthIn.value)/ratio)||1;
  }
});
heightIn.addEventListener("input",function(){
  if(document.getElementById("keepRatio").checked&&origImg){
    widthIn.value=Math.round(parseInt(heightIn.value)*ratio)||1;
  }
});

window.onRatioChange=function(){
  if(document.getElementById("keepRatio").checked&&origImg){
    heightIn.value=Math.round(parseInt(widthIn.value)/ratio)||1;
  }
};

window.setPreset=function(pct){
  if(!origImg)return;
  widthIn.value=Math.round(origW*pct/100);
  heightIn.value=Math.round(origH*pct/100);
};

window.setSize=function(w,h){
  widthIn.value=w;
  if(document.getElementById("keepRatio").checked){
    heightIn.value=Math.round(w/ratio);
  }else{
    heightIn.value=h;
  }
};

window.doResize=function(){
  if(!origImg){alert("이미지를 먼저 업로드해주세요.");return;}
  var w=parseInt(widthIn.value)||1;
  var h=parseInt(heightIn.value)||1;
  var canvas=document.createElement("canvas");
  canvas.width=w;canvas.height=h;
  var ctx=canvas.getContext("2d");
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";
  ctx.drawImage(origImg,0,0,w,h);
  canvas.toBlob(function(blob){
    resultBlob=blob;
    var url=URL.createObjectURL(blob);
    document.getElementById("previewImg").src=url;
    document.getElementById("infoOrig").textContent=origW+" x "+origH+" px";
    document.getElementById("infoNew").textContent=w+" x "+h+" px";
    document.getElementById("infoSize").textContent=(blob.size/1024).toFixed(1)+" KB";
    document.getElementById("resultArea").style.display="block";
    document.getElementById("resultArea").scrollIntoView({behavior:"smooth"});
  },"image/png");
};

window.downloadResult=function(){
  if(!resultBlob)return;
  var a=document.createElement("a");
  a.href=URL.createObjectURL(resultBlob);
  a.download=resultName+".png";
  a.click();
};
})();
</script>
</body>
</html>
